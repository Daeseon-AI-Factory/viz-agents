# Fly.io deploy config for viz-core
# Run: fly launch (first time) or fly deploy

app = "viz-core"  # change to viz-core-yourname when you run `fly launch`
primary_region = "nrt"  # Tokyo. Closest to Korea. Other: "sin" (Singapore), "iad" (US East)

[build]

[env]
  PORT = "8765"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = "stop"   # free tier — sleeps when idle
  auto_start_machines = true
  min_machines_running = 0      # 0 = scale-to-zero (free)
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

# Persistent storage for assets — survives redeploys
[[mounts]]
  source = "viz_data"
  destination = "/app/library"

[[mounts]]
  source = "viz_data_sessions"
  destination = "/app/sessions"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
