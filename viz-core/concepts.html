<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>viz-core — 병신교육소 (개념 라이브러리)</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --dim: #6e7681;
    --accent: #58a6ff; --user: #d29922; --edit: #f78166;
    --bash: #3fb950; --search: #a371f7; --agent: #db61a2;
    --danger: #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, sans-serif;
    padding: 30px;
    max-width: 1200px;
    margin: 0 auto;
    line-height: 1.5;
  }
  h1 { font-size: 26px; }
  .subtitle { color: var(--muted); margin: 6px 0 22px; font-size: 14px; }
  .nav { display: flex; gap: 10px; margin-bottom: 22px; flex-wrap: wrap; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .nav a {
    padding: 7px 13px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); text-decoration: none; font-size: 12px;
    font-family: ui-monospace, monospace;
  }
  .nav a:hover { border-color: var(--accent); color: var(--accent); }
  .back { background: var(--accent); color: #fff !important; }

  /* 검색 + 추가 바 */
  .toolbar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
  .toolbar input[type="text"] {
    flex: 1;
    padding: 10px 14px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 14px;
  }
  .toolbar input[type="text"]:focus { outline: none; border-color: var(--accent); }
  .btn {
    padding: 10px 18px; background: var(--accent); color: #fff;
    border: 0; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 13px;
  }
  .btn:hover { background: var(--bash); }
  .btn-secondary { background: var(--panel); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--danger); }

  /* 카드 그리드 */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 14px; }
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 18px; cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .card-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
  .card-icon { font-size: 28px; flex-shrink: 0; }
  .card-title { font-size: 16px; font-weight: 800; color: var(--accent); }
  .card-tagline { font-size: 12.5px; color: var(--text); margin: 4px 0 8px; line-height: 1.5; }
  .card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
  .card-tag {
    font-size: 10px; padding: 2px 8px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 4px; color: var(--muted);
  }
  .card-category {
    font-size: 10px; color: var(--user); font-weight: 700;
    letter-spacing: 0.5px; text-transform: uppercase;
  }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }

  /* 모달 */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center; z-index: 100;
    padding: 20px;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 26px; max-width: 800px; width: 100%;
    max-height: 90vh; overflow: auto;
  }
  .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .modal-head h2 { font-size: 18px; color: var(--accent); }
  .modal-close { background: transparent; border: 0; color: var(--muted); font-size: 22px; cursor: pointer; }
  .modal-close:hover { color: var(--danger); }

  /* 추가 폼 */
  .form-row { display: grid; grid-template-columns: 140px 1fr; gap: 12px; margin-bottom: 10px; align-items: start; }
  .form-row label { font-size: 12.5px; color: var(--muted); padding-top: 8px; font-weight: 600; }
  .form-row input, .form-row textarea, .form-row select {
    padding: 8px 12px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 13px; font-family: -apple-system, sans-serif;
    width: 100%;
  }
  .form-row textarea { resize: vertical; min-height: 60px; font-family: ui-monospace, monospace; font-size: 12px; }
  .form-row .hint { font-size: 11px; color: var(--dim); margin-top: 3px; }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

  /* concept 뷰 (showcase 와 같은 형태) */
  .concept-view { padding: 0; }
</style>
</head>
<body>

<div class="nav">
  <a href="/" class="back">← viz-core</a>
  <a href="/showcase">📐 showcase</a>
  <a href="/spec">📜 spec</a>
</div>

<h1>💡 병신교육소 — 개념 라이브러리</h1>
<p class="subtitle">본인이 이해한 개념을 시각으로 저장. 나중에 AI 가 추천하면 0.5초에 다시 떠올리기 위한 자산.</p>

<div class="toolbar">
  <input type="text" id="search" placeholder="🔍 검색 (개념 이름 / 태그 / 카테고리)" />
  <button class="btn" onclick="openAddModal()">+ 새 개념 추가</button>
</div>

<div id="grid" class="grid"></div>
<div id="empty" class="empty" style="display:none;">
  <div style="font-size:48px; opacity:0.3;">💭</div>
  <p style="margin-top:14px; font-size:14px;">아직 개념 없음 — 위 "새 개념 추가" 로 시작</p>
</div>

<!-- 보기 모달 -->
<div class="modal-bg" id="view-modal" onclick="if (event.target === this) closeViewModal()">
  <div class="modal">
    <div class="modal-head">
      <h2 id="view-title">개념 보기</h2>
      <button class="modal-close" onclick="closeViewModal()">×</button>
    </div>
    <div id="view-body" class="concept-view"></div>
    <div class="form-actions">
      <button class="btn btn-danger" id="delete-btn">🗑 삭제</button>
      <button class="btn btn-secondary" id="edit-btn">✏️ 수정</button>
      <button class="btn" id="push-btn">📺 옆 탭에 띄우기</button>
    </div>
  </div>
</div>

<!-- 추가/수정 모달 -->
<div class="modal-bg" id="add-modal" onclick="if (event.target === this) closeAddModal()">
  <div class="modal">
    <div class="modal-head">
      <h2 id="add-title">+ 새 개념</h2>
      <button class="modal-close" onclick="closeAddModal()">×</button>
    </div>

    <div class="form-row">
      <label>slug *</label>
      <div>
        <input type="text" id="f-slug" placeholder="caching, db-index, jwt..." />
        <div class="hint">파일명. 소문자/숫자/하이픈만. 한 번 정하면 변경 X.</div>
      </div>
    </div>
    <div class="form-row">
      <label>concept *</label>
      <input type="text" id="f-concept" placeholder="캐싱 (Caching)" />
    </div>
    <div class="form-row">
      <label>tagline</label>
      <input type="text" id="f-tagline" placeholder="한 줄 핵심" />
    </div>
    <div class="form-row">
      <label>카테고리</label>
      <input type="text" id="f-category" placeholder="성능 / 인증 / 데이터 / 아키텍처 ..." />
    </div>
    <div class="form-row">
      <label>태그</label>
      <div>
        <input type="text" id="f-tags" placeholder="성능, DB, 메모리" />
        <div class="hint">쉼표로 구분</div>
      </div>
    </div>
    <div class="form-row">
      <label>비유 이름</label>
      <input type="text" id="f-analogy-name" placeholder="책상 위 메모지" />
    </div>
    <div class="form-row">
      <label>비유 아이콘</label>
      <input type="text" id="f-analogy-icon" placeholder="📝" />
    </div>

    <hr style="border:0; border-top:1px solid var(--border); margin:14px 0;">
    <div style="font-size:13px; color:var(--muted); margin-bottom:8px; font-weight:700;">━━ 안 쓸 때 (DB 까지 매번 감) ━━</div>

    <div class="form-row">
      <label>아이콘</label>
      <input type="text" id="f-w-icon" placeholder="🗄️" />
    </div>
    <div class="form-row">
      <label>설명</label>
      <input type="text" id="f-w-label" placeholder="DB 까지 매번 감" />
    </div>
    <div class="form-row">
      <label>단계 (1줄씩)</label>
      <textarea id="f-w-steps" placeholder="요청&#10;DB 호출&#10;디스크 읽기&#10;응답"></textarea>
    </div>
    <div class="form-row">
      <label>지표</label>
      <input type="text" id="f-w-metric" placeholder="100ms" />
    </div>

    <hr style="border:0; border-top:1px solid var(--border); margin:14px 0;">
    <div style="font-size:13px; color:var(--muted); margin-bottom:8px; font-weight:700;">━━ 쓸 때 (메모 먼저 확인) ━━</div>

    <div class="form-row">
      <label>아이콘</label>
      <input type="text" id="f-y-icon" placeholder="📝" />
    </div>
    <div class="form-row">
      <label>설명</label>
      <input type="text" id="f-y-label" placeholder="메모 먼저 확인" />
    </div>
    <div class="form-row">
      <label>단계 (1줄씩)</label>
      <textarea id="f-y-steps" placeholder="메모 확인&#10;즉시 응답"></textarea>
    </div>
    <div class="form-row">
      <label>지표</label>
      <input type="text" id="f-y-metric" placeholder="1ms" />
    </div>

    <hr style="border:0; border-top:1px solid var(--border); margin:14px 0;">
    <div class="form-row">
      <label>장점 (1줄씩)</label>
      <textarea id="f-pros" placeholder="100배 빠름&#10;DB 부담 ↓"></textarea>
    </div>
    <div class="form-row">
      <label>단점 (1줄씩)</label>
      <textarea id="f-cons" placeholder="메모리 ↑&#10;오래된 정보 가능"></textarea>
    </div>
    <div class="form-row">
      <label>실무 사용처</label>
      <input type="text" id="f-real-world" placeholder="API 응답, 세션, 이미지" />
    </div>

    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeAddModal()">취소</button>
      <button class="btn" onclick="saveConcept()">💾 저장</button>
    </div>
  </div>
</div>

<script>
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

let ALL_CONCEPTS = [];
let editing_slug = null;
let viewing_slug = null;

async function loadList() {
  const r = await fetch("/concepts");
  const d = await r.json();
  ALL_CONCEPTS = d.items || [];
  renderList();
}

function renderList() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const filtered = ALL_CONCEPTS.filter(c => {
    if (!q) return true;
    const h = `${c.concept} ${c.tagline} ${c.category} ${(c.tags || []).join(" ")}`.toLowerCase();
    return h.includes(q);
  });
  const grid = document.getElementById("grid");
  document.getElementById("empty").style.display = filtered.length === 0 && ALL_CONCEPTS.length === 0 ? "block" : "none";
  grid.innerHTML = filtered.map(c => `
    <div class="card" onclick="openView('${esc(c.slug)}')">
      ${c.category ? `<div class="card-category">${esc(c.category)}</div>` : ""}
      <div class="card-head">
        <div class="card-icon">${esc((c.analogy || {}).icon || "💡")}</div>
        <div>
          <div class="card-title">${esc(c.concept)}</div>
        </div>
      </div>
      <div class="card-tagline">${esc(c.tagline || "")}</div>
      ${(c.analogy || {}).name ? `<div style="font-size:11px; color:var(--user); font-weight:700;">비유: ${esc(c.analogy.name)}</div>` : ""}
      <div class="card-tags">
        ${(c.tags || []).map(t => `<span class="card-tag">${esc(t)}</span>`).join("")}
      </div>
    </div>
  `).join("");
}

async function openView(slug) {
  viewing_slug = slug;
  const r = await fetch(`/concepts/${slug}`);
  const d = await r.json();
  if (!d.ok) { alert(d.error); return; }
  document.getElementById("view-title").textContent = d.concept.concept;
  document.getElementById("view-body").innerHTML = renderConcept(d.concept);
  document.getElementById("view-modal").classList.add("show");
}

function closeViewModal() {
  document.getElementById("view-modal").classList.remove("show");
  viewing_slug = null;
}

// concept 렌더 (showcase 와 동일)
function renderConcept(d) {
  const cmp = d.comparison || {}, wo = cmp.without || {}, w_ = cmp.with || {};
  const tr = d.tradeoffs || {}, an = d.analogy || {};
  const stepsList = (arr) => (arr || []).map((s, i) =>
    `<div style="display:flex; gap:8px; align-items:center; padding:4px 0; font-size:13px;">
      <span style="background:var(--panel); color:var(--muted); width:18px; height:18px; border-radius:9px; display:inline-flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0;">${i+1}</span>
      <span>${esc(s)}</span></div>`).join("");
  const pros = (tr.pros || []).map(p => `<div style="padding:5px 0; font-size:13px; display:flex; gap:7px;"><span style="color:var(--bash); font-weight:700;">✓</span><span>${esc(p)}</span></div>`).join("");
  const cons = (tr.cons || []).map(c => `<div style="padding:5px 0; font-size:13px; display:flex; gap:7px;"><span style="color:var(--danger); font-weight:700;">✗</span><span>${esc(c)}</span></div>`).join("");
  return `<div style="background:var(--bg); border:1px solid var(--border); border-radius:12px; overflow:hidden;">
    <div style="background:linear-gradient(135deg, rgba(88,166,255,0.12), rgba(63,185,80,0.06)); padding:20px 24px; border-bottom:1px solid var(--border);">
      <div style="font-size:22px; font-weight:800; color:var(--accent); letter-spacing:-0.3px;">${esc(d.concept)}</div>
      ${d.tagline ? `<div style="font-size:14px; color:var(--text); margin-top:6px; line-height:1.5;">${esc(d.tagline)}</div>` : ""}
      ${an.name ? `<div style="margin-top:12px; padding:10px 14px; background:rgba(210,153,34,0.1); border:1px solid var(--user); border-radius:8px; font-size:13px; color:var(--text); display:inline-flex; align-items:center; gap:8px;">
        <span style="font-size:18px;">${esc(an.icon || "💡")}</span>
        <span><strong style="color:var(--user);">비유:</strong> ${esc(an.name)}</span>
      </div>` : ""}
    </div>
    ${(wo.label || w_.label) ? `<div style="display:grid; grid-template-columns:1fr 1fr; gap:0; border-bottom:1px solid var(--border);">
      <div style="padding:18px 22px; border-right:1px solid var(--border); background:rgba(248,81,73,0.04);">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
          <span style="font-size:28px;">${esc(wo.icon || "🗄️")}</span>
          <div>
            <div style="font-size:11px; color:var(--danger); text-transform:uppercase; letter-spacing:1px; font-weight:700;">안 쓸 때</div>
            <div style="font-size:14px; font-weight:700; color:var(--text);">${esc(wo.label || "")}</div>
          </div>
        </div>
        ${stepsList(wo.steps)}
        ${wo.metric ? `<div style="margin-top:10px; padding:6px 12px; background:var(--panel); border-radius:6px; font-size:13px; color:var(--danger); font-weight:700; display:inline-block;">⏱ ${esc(wo.metric)}</div>` : ""}
      </div>
      <div style="padding:18px 22px; background:rgba(63,185,80,0.04);">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
          <span style="font-size:28px;">${esc(w_.icon || "📝")}</span>
          <div>
            <div style="font-size:11px; color:var(--bash); text-transform:uppercase; letter-spacing:1px; font-weight:700;">쓸 때</div>
            <div style="font-size:14px; font-weight:700; color:var(--text);">${esc(w_.label || "")}</div>
          </div>
        </div>
        ${stepsList(w_.steps)}
        ${w_.metric ? `<div style="margin-top:10px; padding:6px 12px; background:var(--panel); border-radius:6px; font-size:13px; color:var(--bash); font-weight:700; display:inline-block;">⏱ ${esc(w_.metric)}</div>` : ""}
      </div>
    </div>` : ""}
    ${(pros || cons) ? `<div style="display:grid; grid-template-columns:1fr 1fr; gap:0; border-bottom:1px solid var(--border);">
      <div style="padding:14px 22px; border-right:1px solid var(--border);">
        <div style="font-size:11px; color:var(--bash); text-transform:uppercase; letter-spacing:1px; font-weight:700; margin-bottom:8px;">장점</div>
        ${pros || `<div style="color:var(--dim); font-size:12px;">—</div>`}
      </div>
      <div style="padding:14px 22px;">
        <div style="font-size:11px; color:var(--danger); text-transform:uppercase; letter-spacing:1px; font-weight:700; margin-bottom:8px;">단점</div>
        ${cons || `<div style="color:var(--dim); font-size:12px;">—</div>`}
      </div>
    </div>` : ""}
    ${d.real_world ? `<div style="padding:14px 22px; background:var(--panel);">
      <span style="font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; font-weight:700;">💼 실무 사용처</span>
      <span style="font-size:13px; color:var(--text); margin-left:10px;">${esc(d.real_world)}</span>
    </div>` : ""}
  </div>`;
}

function openAddModal(prefill) {
  editing_slug = null;
  const f = (id, v="") => document.getElementById(id).value = v;
  if (prefill) {
    editing_slug = prefill.slug;
    document.getElementById("add-title").textContent = `✏️ 수정: ${prefill.concept}`;
    f("f-slug", prefill.slug || "");
    document.getElementById("f-slug").disabled = true;
    f("f-concept", prefill.concept || "");
    f("f-tagline", prefill.tagline || "");
    f("f-category", prefill.category || "");
    f("f-tags", (prefill.tags || []).join(", "));
    f("f-analogy-name", (prefill.analogy || {}).name || "");
    f("f-analogy-icon", (prefill.analogy || {}).icon || "");
    const wo = (prefill.comparison || {}).without || {};
    const w_ = (prefill.comparison || {}).with || {};
    f("f-w-icon", wo.icon || ""); f("f-w-label", wo.label || ""); f("f-w-steps", (wo.steps || []).join("\n")); f("f-w-metric", wo.metric || "");
    f("f-y-icon", w_.icon || ""); f("f-y-label", w_.label || ""); f("f-y-steps", (w_.steps || []).join("\n")); f("f-y-metric", w_.metric || "");
    f("f-pros", ((prefill.tradeoffs || {}).pros || []).join("\n"));
    f("f-cons", ((prefill.tradeoffs || {}).cons || []).join("\n"));
    f("f-real-world", prefill.real_world || "");
  } else {
    document.getElementById("add-title").textContent = "+ 새 개념";
    ["f-slug","f-concept","f-tagline","f-category","f-tags","f-analogy-name","f-analogy-icon",
     "f-w-icon","f-w-label","f-w-steps","f-w-metric",
     "f-y-icon","f-y-label","f-y-steps","f-y-metric",
     "f-pros","f-cons","f-real-world"].forEach(id => f(id, ""));
    document.getElementById("f-slug").disabled = false;
  }
  document.getElementById("add-modal").classList.add("show");
}

function closeAddModal() {
  document.getElementById("add-modal").classList.remove("show");
}

async function saveConcept() {
  const v = (id) => document.getElementById(id).value.trim();
  const lines = (id) => v(id).split("\n").map(s => s.trim()).filter(s => s);
  const slug = (v("f-slug") || "").toLowerCase();
  if (!slug) { alert("slug 필요"); return; }
  if (!v("f-concept")) { alert("concept 필요"); return; }

  const body = {
    slug,
    concept: v("f-concept"),
    tagline: v("f-tagline"),
    category: v("f-category"),
    tags: v("f-tags").split(",").map(s => s.trim()).filter(s => s),
    analogy: { name: v("f-analogy-name"), icon: v("f-analogy-icon") },
    comparison: {
      without: { icon: v("f-w-icon"), label: v("f-w-label"), steps: lines("f-w-steps"), metric: v("f-w-metric") },
      with: { icon: v("f-y-icon"), label: v("f-y-label"), steps: lines("f-y-steps"), metric: v("f-y-metric") },
    },
    tradeoffs: { pros: lines("f-pros"), cons: lines("f-cons") },
    real_world: v("f-real-world"),
  };

  const r = await fetch("/concepts", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  const d = await r.json();
  if (!d.ok) { alert(d.error || "저장 실패"); return; }
  closeAddModal();
  await loadList();
}

document.getElementById("edit-btn").onclick = async () => {
  if (!viewing_slug) return;
  const r = await fetch(`/concepts/${viewing_slug}`);
  const d = await r.json();
  if (d.ok) {
    closeViewModal();
    openAddModal(d.concept);
  }
};

document.getElementById("delete-btn").onclick = async () => {
  if (!viewing_slug) return;
  if (!confirm(`"${viewing_slug}" 삭제? 되돌릴 수 없음.`)) return;
  await fetch(`/concepts/${viewing_slug}`, { method: "DELETE" });
  closeViewModal();
  await loadList();
};

document.getElementById("push-btn").onclick = async () => {
  if (!viewing_slug) return;
  await fetch(`/concepts/${viewing_slug}/show`, { method: "POST" });
  alert("옆 탭 viz-core 메인에 표시됨!");
};

document.getElementById("search").addEventListener("input", renderList);

loadList();
</script>

</body>
</html>
